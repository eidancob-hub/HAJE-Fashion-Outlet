<!------contact------->
<div class="contact-container">

    <!-- Contact Form -->
    <div class="contact-form">
      <h2>Contact Us</h2>

      <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name.." required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email.." required>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Your message.." required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>

    <!-- Map -->
    <div class="map-container">
      <iframe
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7573.919165596239!2d-88.44736570885973!3d18.349128230845718!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8f5b945e66badb89%3A0xed150b0c4b4b373a!2sSan%20Joaquin!5e0!3m2!1sen!2sbz!4v1769154348749!5m2!1sen!2sbz"
